<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartFran Docs</title>
    <base href="/" />

    <!-- Design System Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- MudBlazor CSS -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- SmartFran Design System CSS (servido desde la RCL) -->
    <link href="_content/SmartFran.Components/css/smartfran.css" rel="stylesheet" />

    <!-- App CSS (scoped styles) -->
    <link href="SmartFran.Docs.styles.css" rel="stylesheet" />

    <!-- Docs global styles -->
    <link href="css/docs.css" rel="stylesheet" />

    <!-- Prism.js syntax highlighting (tema Okaidia) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div style="
            display:flex; align-items:center; justify-content:center;
            height:100vh; flex-direction:column; gap:1rem;
            font-family:'Manrope',sans-serif; color:#8a00cb;
        ">
            <span class="material-symbols-outlined" style="font-size:3rem;">widgets</span>
            <p style="margin:0; font-size:.85rem; opacity:.6;">Cargando SmartFran Docs...</p>
        </div>
    </div>

    <div id="blazor-error-ui" style="
        background:rgba(186,26,26,0.92); bottom:0; left:0;
        box-sizing:border-box; display:none; padding:0.6rem 1rem;
        position:fixed; width:100%; z-index:1000;
        color:#ffdad6; font-family:Manrope,sans-serif; font-size:.875rem;
    ">
        Un error inesperado ocurrió.
        <a href="" class="reload" style="color:#e6b4ff; font-weight:700; margin-left:.5rem;">Recargar</a>
        <a class="dismiss" style="cursor:pointer; color:#e6b4ff; float:right;">✕</a>
    </div>

    <!-- Prism.js + plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

    <!-- SmartFran Docs helpers -->
    <script src="js/docs.js"></script>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
